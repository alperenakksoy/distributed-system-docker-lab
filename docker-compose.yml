version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend
    depends_on:
      - redis
    networks:
      - mynetwork
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  redis:
    image: redis:7
    container_name: redis
    networks:
      - mynetwork
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "128M"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - mynetwork
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "128M"

networks:
  mynetwork:
    driver: bridge